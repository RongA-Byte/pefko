services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: arca
      POSTGRES_USER: arca
      POSTGRES_PASSWORD: arca_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arca"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
